name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run pytest --cov=card_relay --cov-report=term-missing
      - run: node --check extension/page-observer.js
      - run: node --check extension/content.js
      - run: node --check extension/background.js
      - run: node --check extension/popup.js
      - run: node --check extension/dex-page-observer.js
      - run: node --check extension/dex-content.js
      - run: node --test tests/js/page-observer.test.mjs
      - run: node --test tests/js/dex-page-observer.test.mjs

